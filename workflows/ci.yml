name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: biostock
          POSTGRES_USER: biostock
          POSTGRES_PASSWORD: biostock
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U biostock -d biostock"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_NAME: biostock
      DB_USER: biostock
      DB_PASSWORD: biostock
      DB_HOST: localhost
      DB_PORT: 5432
      DJANGO_SECRET_KEY: ci-secret
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      USE_SQLITE: "True"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python manage.py migrate
      - run: pytest --cov=api --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
