services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: biostock
      POSTGRES_USER: biostock
      POSTGRES_PASSWORD: biostock
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biostock -d biostock"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DB_NAME: biostock
      DB_USER: biostock
      DB_PASSWORD: biostock
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_SETTINGS_MODULE: biostock.settings
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python manage.py migrate && gunicorn biostock.wsgi:application --bind 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
