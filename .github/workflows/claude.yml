name: Claude Code

# Lets you @claude in an issue or PR comment and have Claude respond,
# make changes, and push commits / open a PR automatically.
#
# SETUP (one-time):
#   1. Install the Claude GitHub App on this repo:
#      https://github.com/apps/claude  (or run `/install-github-app` in Claude Code)
#   2. Add a repo secret named ANTHROPIC_API_KEY
#      (Settings -> Secrets and variables -> Actions -> New repository secret).
# For the always-current workflow, prefer running `/install-github-app`.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only run when someone actually mentions @claude.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
